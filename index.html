<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <script>
        var url_a = "https://xsxshiny.shinyapps.io/ab-test-version-a/";
        var url_b = "https://xsxshiny.shinyapps.io/ab-test-version-b/";

        var assigned_url = localStorage.getItem('ab_test_version');

        if (!assigned_url) {
            var target_urls = [url_a, url_b];
            assigned_url = target_urls[Math.floor(Math.random() * target_urls.length)];
            localStorage.setItem('ab_test_version', assigned_url);
        }

        window.location.replace(assigned_url);
    </script>
</head>
<body>
    <h3 style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        🚀 Redirecting you to the challenge... Please wait...
    </h3>
</body>
</html>
